// ============================================================
// FIGURE RENDERER
// ============================================================

function Figure({ question, moduleColor }) {
  if (question.svgFigure && SVGFigures[question.svgFigure]) {
    const SvgComponent = SVGFigures[question.svgFigure];
    return (
      <div className="my-4 p-4 bg-white border border-stone-300 rounded">
        <SvgComponent />
        {question.figureCaption && (
          <div className="text-center text-xs italic text-stone-600 mt-2">{question.figureCaption}</div>
        )}
      </div>
    );
  }
  if (question.figure && figures[question.figure]) {
    return (
      <div className="my-4 p-4 bg-white border border-stone-300 rounded">
        <img src={figures[question.figure]} alt={question.figureCaption || "Figure"} className="w-full max-w-2xl mx-auto" />
        {question.figureCaption && (
          <div className="text-center text-xs italic text-stone-600 mt-2">{question.figureCaption}</div>
        )}
      </div>
    );
  }
  return null;
}

// ============================================================
// STORAGE UTILITIES
// ============================================================

const STORAGE_KEY = "sam4a_progress_v1";

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return {};
}

function saveProgress(progress) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  } catch {}
}

function SAM4ATrainer() {
  const [view, setView] = useState("home");
  const [moduleId, setModuleId] = useState(null);
  const [practiceIndex, setPracticeIndex] = useState(0);
  const [showAnswer, setShowAnswer] = useState(false);
  const [progress, setProgress] = useState({});
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const p = loadProgress();
    setProgress(p || {});
    setLoaded(true);
  }, []);

  const flatQuestions = useMemo(() => {
    const out = {};
    modules.forEach((m) => {
      const arr = [];
      m.sections.forEach((sec, si) => {
        sec.questions.forEach((q, qi) => {
          arr.push({ ...q, sectionTitle: sec.title, sectionIntro: sec.intro, sectionIndex: si, qIndex: qi });
        });
      });
      out[m.id] = arr;
    });
    return out;
  }, []);

  const currentModule = modules.find((m) => m.id === moduleId);

  function markQuestion(moduleId, globalIdx, status) {
    const newProgress = { ...progress };
    if (!newProgress[moduleId]) newProgress[moduleId] = {};
    newProgress[moduleId][globalIdx] = status;
    setProgress(newProgress);
    saveProgress(newProgress);
  }

  function resetModule(moduleId) {
    const newProgress = { ...progress };
    delete newProgress[moduleId];
    setProgress(newProgress);
    saveProgress(newProgress);
  }

  function resetAll() {
    setProgress({});
    saveProgress({});
  }

  // =========== HOME ===========
  if (view === "home") {
    const totalQuestions = Object.values(flatQuestions).reduce((sum, arr) => sum + arr.length, 0);
    const answeredCount = Object.values(progress).reduce(
      (sum, mod) => sum + Object.values(mod).filter((v) => v === "known" || v === "review").length,
      0
    );

    return (
      <div className="min-h-screen" style={{ background: "#FDFCF8", fontFamily: "Georgia, 'Times New Roman', serif" }}>
        <div className="max-w-5xl mx-auto px-6 py-10">
          <header className="border-b-2 border-stone-800 pb-6 mb-8">
            <div className="flex items-start justify-between gap-4 flex-wrap">
              <div>
                <div className="text-xs tracking-widest uppercase text-stone-500 mb-2">Norges Handelshøyskole · Vår 2026</div>
                <h1 className="text-5xl font-bold text-stone-900 tracking-tight" style={{ fontFamily: "Georgia, serif" }}>
                  SAM4A — Applied Economics
                </h1>
                <div className="text-xl text-stone-700 italic mt-2">Eksamenstrener</div>
              </div>
              <div className="text-right">
                <div className="text-xs uppercase tracking-widest text-stone-500 mb-1">Eksamen</div>
                <div className="text-2xl font-bold text-stone-900">29. april 2026</div>
                <div className="text-sm text-stone-600">09:00–12:00 · Digital skoleeksamen</div>
              </div>
            </div>
          </header>

          <section className="mb-8 p-5 bg-stone-50 border-l-4 border-stone-900">
            <div className="flex items-center gap-3 mb-2">
              <TrendingUp size={18} className="text-stone-700" />
              <div className="text-sm uppercase tracking-widest text-stone-600 font-semibold">Framgang</div>
            </div>
            <div className="flex items-end gap-4 flex-wrap">
              <div>
                <div className="text-4xl font-bold text-stone-900">
                  {answeredCount}
                  <span className="text-xl text-stone-500 font-normal"> / {totalQuestions}</span>
                </div>
                <div className="text-sm text-stone-600">spørsmål gjennomgått</div>
              </div>
              <div className="flex-1 min-w-[200px]">
                <div className="h-2 bg-stone-200 rounded-full overflow-hidden">
                  <div
                    className="h-full bg-stone-800 transition-all duration-500"
                    style={{ width: `${totalQuestions ? (answeredCount / totalQuestions) * 100 : 0}%` }}
                  />
                </div>
              </div>
              {answeredCount > 0 && (
                <button
                  onClick={() => {
                    if (confirm("Nullstill all framgang?")) resetAll();
                  }}
                  className="text-xs text-stone-500 hover:text-stone-900 underline"
                >
                  Nullstill alt
                </button>
              )}
            </div>
          </section>

          <section>
            <h2 className="text-sm uppercase tracking-widest text-stone-500 mb-4 font-semibold">Velg modul</h2>
            <div className="space-y-3">
              {modules.map((m) => {
                const total = flatQuestions[m.id].length;
                const modProgress = progress[m.id] || {};
                const answered = Object.values(modProgress).filter((v) => v === "known" || v === "review").length;
                const known = Object.values(modProgress).filter((v) => v === "known").length;
                const hasFigures = flatQuestions[m.id].some((q) => q.figure || q.svgFigure);
                return (
                  <button
                    key={m.id}
                    onClick={() => {
                      setModuleId(m.id);
                      setView("module");
                    }}
                    className="w-full text-left border border-stone-300 hover:border-stone-900 transition-colors bg-white group overflow-hidden"
                    style={{ borderLeftWidth: "6px", borderLeftColor: m.color }}
                  >
                    <div className="p-5 flex items-center gap-4">
                      <div className="flex-1">
                        <div className="text-xl font-bold text-stone-900 group-hover:text-stone-700">{m.title}</div>
                        <div className="text-sm text-stone-600 italic mt-0.5">{m.subtitle}</div>
                        <div className="text-xs text-stone-500 mt-2 flex gap-3 flex-wrap items-center">
                          <span>{total} spørsmål</span>
                          <span>·</span>
                          <span>{answered}/{total} gjennomgått</span>
                          {known > 0 && (
                            <>
                              <span>·</span>
                              <span className="text-emerald-700">{known} mestret</span>
                            </>
                          )}
                          {hasFigures && (
                            <>
                              <span>·</span>
                              <span className="inline-flex items-center gap-1 text-stone-500"><ImageIcon size={11}/> inkl. figurer</span>
                            </>
                          )}
                        </div>
                      </div>
                      <ChevronRight size={24} className="text-stone-400 group-hover:text-stone-900 group-hover:translate-x-1 transition-transform" />
                    </div>
                  </button>
                );
              })}
            </div>
          </section>

          <footer className="mt-12 pt-6 border-t border-stone-200 text-xs text-stone-500 leading-relaxed">
            <p className="mb-1"><strong>Slik bruker du trenreren:</strong> Velg en modul, les spørsmålet (med tilhørende figur/tabell hvis relevant), formulér svaret ditt (mentalt eller skriftlig), og bruk «Vis fasit» for å sjekke. Marker hvert spørsmål som <em>mestret</em>, <em>repeter</em> eller <em>hopp over</em>. Framgangen lagres automatisk.</p>
            <p>Eksamensstrukturen: Én kort spørsmål-del + tre dybdeoppgaver. Svarene skal være <em>korte, presise og direkte</em> — ikke skriv alt du kommer på.</p>
          </footer>
        </div>
      </div>
    );
  }

  // =========== MODULE VIEW (list) ===========
  if (view === "module" && currentModule) {
    const qs = flatQuestions[currentModule.id];
    const modProgress = progress[currentModule.id] || {};

    return (
      <div className="min-h-screen" style={{ background: currentModule.bgTint, fontFamily: "Georgia, 'Times New Roman', serif" }}>
        <div className="max-w-4xl mx-auto px-6 py-8">
          <div className="flex items-center justify-between mb-6">
            <button
              onClick={() => setView("home")}
              className="flex items-center gap-2 text-stone-700 hover:text-stone-900 text-sm"
            >
              <ArrowLeft size={16} /> Tilbake til oversikt
            </button>
            <button
              onClick={() => {
                if (confirm(`Nullstill framgang i ${currentModule.title}?`)) resetModule(currentModule.id);
              }}
              className="text-xs text-stone-500 hover:text-stone-800 underline"
            >
              Nullstill modul
            </button>
          </div>

          <header className="mb-8 pb-5 border-b-2" style={{ borderColor: currentModule.color }}>
            <h1 className="text-4xl font-bold text-stone-900" style={{ color: currentModule.color }}>
              {currentModule.title}
            </h1>
            <div className="text-lg text-stone-700 italic mt-1">{currentModule.subtitle}</div>
          </header>

          <div className="mb-6 flex gap-3 flex-wrap">
            <button
              onClick={() => {
                setPracticeIndex(0);
                setShowAnswer(false);
                setView("practice");
              }}
              className="px-5 py-2.5 bg-stone-900 text-white font-semibold hover:bg-stone-800 transition-colors flex items-center gap-2"
            >
              <BookOpen size={16} /> Start fra begynnelsen
            </button>
            {Object.values(modProgress).some((v) => v === "review") && (
              <button
                onClick={() => {
                  const firstReview = qs.findIndex((_, i) => modProgress[i] === "review");
                  setPracticeIndex(firstReview >= 0 ? firstReview : 0);
                  setShowAnswer(false);
                  setView("practice");
                }}
                className="px-5 py-2.5 bg-amber-700 text-white font-semibold hover:bg-amber-800 transition-colors flex items-center gap-2"
              >
                <RotateCcw size={16} /> Repeter markerte
              </button>
            )}
          </div>

          <div className="space-y-1">
            {currentModule.sections.map((section, si) => {
              const sectionQs = qs.map((q, gi) => ({ q, gi })).filter(({ q }) => q.sectionIndex === si);
              return (
                <div key={si} className="mb-6">
                  <h2 className="text-lg font-bold text-stone-800 mb-2 pb-1 border-b border-stone-300">{section.title}</h2>
                  {section.intro && (
                    <div className="text-sm text-stone-600 italic mb-3 pl-3 border-l-2 border-stone-400">{section.intro}</div>
                  )}
                  <div className="space-y-1.5">
                    {sectionQs.map(({ q, gi }) => {
                      const status = modProgress[gi];
                      const hasFig = q.figure || q.svgFigure;
                      return (
                        <button
                          key={gi}
                          onClick={() => {
                            setPracticeIndex(gi);
                            setShowAnswer(false);
                            setView("practice");
                          }}
                          className="w-full text-left bg-white border border-stone-300 hover:border-stone-800 p-3 transition-colors flex items-start gap-3"
                        >
                          <div className="mt-0.5 flex-shrink-0">
                            {status === "known" ? (
                              <CheckCircle2 size={18} className="text-emerald-600" />
                            ) : status === "review" ? (
                              <RotateCcw size={18} className="text-amber-600" />
                            ) : (
                              <Circle size={18} className="text-stone-300" />
                            )}
                          </div>
                          <div className="text-sm text-stone-800 flex-1">{q.q}</div>
                          {hasFig && <ImageIcon size={14} className="text-stone-400 mt-0.5 flex-shrink-0" />}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // =========== PRACTICE VIEW ===========
  if (view === "practice" && currentModule) {
    const qs = flatQuestions[currentModule.id];
    const current = qs[practiceIndex];
    const modProgress = progress[currentModule.id] || {};
    const status = modProgress[practiceIndex];

    function next() {
      if (practiceIndex < qs.length - 1) {
        setPracticeIndex(practiceIndex + 1);
        setShowAnswer(false);
      }
    }
    function prev() {
      if (practiceIndex > 0) {
        setPracticeIndex(practiceIndex - 1);
        setShowAnswer(false);
      }
    }

    return (
      <div className="min-h-screen" style={{ background: currentModule.bgTint, fontFamily: "Georgia, 'Times New Roman', serif" }}>
        <div className="max-w-3xl mx-auto px-6 py-6">
          <div className="flex items-center justify-between mb-5 gap-3">
            <button
              onClick={() => setView("module")}
              className="flex items-center gap-1.5 text-stone-700 hover:text-stone-900 text-sm"
            >
              <ArrowLeft size={16} /> Oversikt
            </button>
            <div className="flex items-center gap-2 text-xs text-stone-600">
              <span className="font-semibold">{practiceIndex + 1}</span>
              <span className="text-stone-400">/</span>
              <span>{qs.length}</span>
            </div>
            <button onClick={() => setView("home")} className="text-stone-700 hover:text-stone-900">
              <Home size={16} />
            </button>
          </div>

          <div className="h-1 bg-stone-200 mb-6 rounded-full overflow-hidden">
            <div
              className="h-full transition-all duration-300"
              style={{
                width: `${((practiceIndex + 1) / qs.length) * 100}%`,
                background: currentModule.color,
              }}
            />
          </div>

          <div className="mb-3">
            <div className="text-xs uppercase tracking-wider font-semibold" style={{ color: currentModule.color }}>
              {current.sectionTitle}
            </div>
            {current.sectionIntro && (
              <div className="text-sm text-stone-600 italic mt-1 pl-3 border-l-2" style={{ borderColor: currentModule.color }}>
                {current.sectionIntro}
              </div>
            )}
          </div>

          <div className="bg-white border border-stone-300 p-6 mb-5 shadow-sm">
            <div className="text-xs uppercase tracking-widest text-stone-500 font-semibold mb-2">Spørsmål</div>
            <div className="text-lg text-stone-900 leading-relaxed">{current.q}</div>
            <Figure question={current} moduleColor={currentModule.color} />
          </div>

          {!showAnswer ? (
            <div className="bg-stone-100 border border-dashed border-stone-400 p-6 mb-5 text-center">
              <p className="text-stone-600 italic mb-4 text-sm">
                Formulér svaret ditt (tenk eller skriv ned), så se fasit.
              </p>
              <button
                onClick={() => setShowAnswer(true)}
                className="px-6 py-2.5 bg-stone-900 text-white font-semibold hover:bg-stone-800 transition-colors inline-flex items-center gap-2"
              >
                <Eye size={16} /> Vis fasit
              </button>
            </div>
          ) : (
            <div className="bg-stone-900 text-stone-50 p-6 mb-5 shadow-sm">
              <div className="flex items-center justify-between mb-3">
                <div className="text-xs uppercase tracking-widest font-semibold text-stone-400">Fasit</div>
                <button
                  onClick={() => setShowAnswer(false)}
                  className="text-xs text-stone-400 hover:text-stone-200 flex items-center gap-1"
                >
                  <EyeOff size={12} /> Skjul
                </button>
              </div>
              <div className="text-base leading-relaxed whitespace-pre-wrap" style={{ fontFamily: "Georgia, serif" }}>
                {current.a}
              </div>
            </div>
          )}

          {showAnswer && (
            <div className="mb-5">
              <div className="text-xs uppercase tracking-widest text-stone-500 font-semibold mb-2">Hvordan gikk det?</div>
              <div className="grid grid-cols-3 gap-2">
                <button
                  onClick={() => {
                    markQuestion(currentModule.id, practiceIndex, "known");
                    setTimeout(next, 150);
                  }}
                  className={`p-3 border text-sm font-semibold transition-colors ${
                    status === "known"
                      ? "bg-emerald-700 text-white border-emerald-700"
                      : "bg-white text-emerald-700 border-emerald-600 hover:bg-emerald-50"
                  }`}
                >
                  <CheckCircle2 size={16} className="inline mr-1" /> Mestret
                </button>
                <button
                  onClick={() => {
                    markQuestion(currentModule.id, practiceIndex, "review");
                    setTimeout(next, 150);
                  }}
                  className={`p-3 border text-sm font-semibold transition-colors ${
                    status === "review"
                      ? "bg-amber-600 text-white border-amber-600"
                      : "bg-white text-amber-700 border-amber-600 hover:bg-amber-50"
                  }`}
                >
                  <RotateCcw size={16} className="inline mr-1" /> Repeter
                </button>
                <button
                  onClick={() => {
                    markQuestion(currentModule.id, practiceIndex, null);
                    setTimeout(next, 150);
                  }}
                  className="p-3 border border-stone-400 bg-white text-stone-700 text-sm font-semibold hover:bg-stone-50 transition-colors"
                >
                  Hopp over
                </button>
              </div>
            </div>
          )}

          <div className="flex items-center justify-between mt-6 pt-4 border-t border-stone-300">
            <button
              onClick={prev}
              disabled={practiceIndex === 0}
              className="flex items-center gap-2 px-3 py-2 text-sm text-stone-700 hover:text-stone-900 disabled:opacity-30 disabled:cursor-not-allowed"
            >
              <ArrowLeft size={16} /> Forrige
            </button>
            <div className="flex items-center gap-1">
              {status === "known" && <CheckCircle2 size={14} className="text-emerald-600" />}
              {status === "review" && <RotateCcw size={14} className="text-amber-600" />}
              <span className="text-xs text-stone-500">
                {status === "known" ? "Mestret" : status === "review" ? "Markert for repetisjon" : "Ikke markert"}
              </span>
            </div>
            <button
              onClick={next}
              disabled={practiceIndex === qs.length - 1}
              className="flex items-center gap-2 px-3 py-2 text-sm font-semibold text-stone-900 hover:text-stone-700 disabled:opacity-30 disabled:cursor-not-allowed"
            >
              Neste <ArrowRight size={16} />
            </button>
          </div>

          {practiceIndex === qs.length - 1 && showAnswer && status && (
            <div className="mt-6 p-5 bg-white border-2 text-center" style={{ borderColor: currentModule.color }}>
              <Award size={32} className="mx-auto mb-2" style={{ color: currentModule.color }} />
              <div className="text-lg font-bold text-stone-900 mb-1">Modulen er fullført!</div>
              <div className="text-sm text-stone-600 mb-3">Du har gjennomgått alle spørsmål i {currentModule.title}.</div>
              <button
                onClick={() => setView("module")}
                className="text-sm underline text-stone-700 hover:text-stone-900"
              >
                Tilbake til oversikt
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  if (!loaded) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: "#FDFCF8" }}>
        <div className="text-stone-500">Laster…</div>
      </div>
    );
  }

  return null;
}


// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(SAM4ATrainer));

</script>
</body>
</html>
