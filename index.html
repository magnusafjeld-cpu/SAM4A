<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAM4A — Eksamenstrener</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; font-family: Georgia, 'Times New Roman', serif; background: #FDFCF8; }
  #loading-indicator { text-align: center; padding: 4rem; color: #78716c; font-style: italic; }
  #root:not(:empty) ~ #loading-indicator { display: none; }
  #root button { cursor: pointer; }
  #root img { max-width: 100%; height: auto; }
</style>
</head>
<body>
<div id="root"></div>
<div id="loading-indicator">Laster eksamenstreneren…</div>

<script>
window.addEventListener("error", function(e) {
  const root = document.getElementById("root");
  const loading = document.getElementById("loading-indicator");
  if (loading) loading.style.display = "none";
  if (root) {
    const div = document.createElement("div");
    div.style.cssText = "padding:2rem;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;margin:2rem;font-family:sans-serif;border-radius:8px;";
    div.innerHTML = "<h2 style='margin-top:0'>Feil ved lasting</h2><p><strong>" + (e.message || "Ukjent feil") + "</strong></p><p style='font-size:0.85em;color:#7c2d12'>" + (e.filename || "") + (e.lineno ? " linje " + e.lineno : "") + "</p>";
    root.appendChild(div);
  }
});
</script>
